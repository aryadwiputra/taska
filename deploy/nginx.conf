# Qeerja — Nginx Configuration Template
# 
# Usage:
#   1. Copy file ini ke /etc/nginx/sites-available/taska.web.id
#   2. Sesuaikan server_name, ssl path, root path
#   3. ln -s /etc/nginx/sites-available/taska.web.id /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name taska.web.id www.taska.web.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name taska.web.id www.taska.web.id;

    root /var/www/taska.web.id/public;
    index index.php;

    # SSL — sesuaikan dengan certificate path
    ssl_certificate     /etc/ssl/certs/taska.web.id.pem;
    ssl_certificate_key /etc/ssl/private/taska.web.id.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data: https://fonts.bunny.net; connect-src 'self' ws://taska.web.id:6001 wss://taska.web.id:6001; frame-ancestors 'none';" always;

    # Laravel public directory
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Reverb WebSocket — via port 6001
    location /app {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Socket.IO Realtime Gateway — port 3002
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Static assets cache
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /storage/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to sensitive files
    location ~ /\.(git|env|htaccess) {
        deny all;
    }

    location ~ /storage/logs/ {
        deny all;
    }

    # Brotli / Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_vary on;

    client_max_body_size 20M;
}
